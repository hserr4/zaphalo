services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["yarn", "start:prod"]
    restart: always
    volumes:
      - server-local-data:/app/packages/server/.local-storage
    ports:
      - '${PORT:-3000}:3000'
      - '${WEBSOCKET_PORT:-4000}:4000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}
      APP_SECRET: ${APP_SECRET:-asasasasa}
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:-postgres}@${PG_DATABASE_HOST:-db}:${PG_DATABASE_PORT:-5432}/${PG_DATABASE_NAME:-yaariapi}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT:-4000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SERVER_URL: ${SERVER_URL:-api.avynt.com.br}
      BACKEND_URL: ${BACKEND_URL:-https://api.avynt.com.br}
      IS_MULTIWORKSPACE_ENABLED: ${IS_MULTIWORKSPACE_ENABLED:-true}
      GOOGLE_AUTH_ENABLED: ${GOOGLE_AUTH_ENABLED:-false}
      GOOGLE_AUTH_CLIENT_ID: ${GOOGLE_AUTH_CLIENT_ID}
      GOOGLE_AUTH_CLIENT_SECRET: ${GOOGLE_AUTH_CLIENT_SECRET}
      # Update callback URLs to use SERVER_URL or BACKEND_URL logic if needed
      GOOGLE_AUTH_CALLBACK_URL: ${GOOGLE_AUTH_CALLBACK_URL:-https://api.avynt.com.br/google/auth/redirect}
      GOOGLE_AUTH_APIS_CALLBACK_URL: ${GOOGLE_AUTH_APIS_CALLBACK_URL:-https://api.avynt.com.br/auth/google-apis/get-access-token}

  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker-postgres-multiple-dbs.sh:/docker-entrypoint-initdb.d/docker-postgres-multiple-dbs.sh
    environment:
      POSTGRES_USER: ${PG_DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DATABASE_NAME:-yaariapi}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DATABASE_USER:-postgres} -d ${PG_DATABASE_NAME:-yaariapi}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  server-local-data:

